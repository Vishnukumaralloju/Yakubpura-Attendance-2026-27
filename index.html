<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTWRJC Attendance Web App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>అటెండెన్స్ యాప్</h2>
    
    <div class="form-group">
        <label>తేదీ (Date):</label>
        <input type="text" id="attendanceDate" value="23-Jun-2026">
    </div>

    <div class="form-group">
        <label>రోల్ నంబర్ (Roll No):</label>
        <input type="number" id="rollNo" placeholder="ఉదాహరణకు: 1">
    </div>

    <div class="form-group">
        <label>స్టేటస్ (Status):</label>
        <select id="status">
            <option value="true">Present (టిక్ చేయి)</option>
            <option value="false">Absent (టిక్ తీసేయి)</option>
        </select>
    </div>

    <button onclick="submitAttendance()">అప్‌డేట్ చేయి</button>
    <p id="msg" style="color: blue; font-weight: bold;"></p>
</div>

<script src="app.js"></script>
</body>
</html>
