<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTWRJC YAKUBPURA Attendance</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 15px; background-color: #121212; color: #ffffff; margin: 0; }
        .container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.5); margin: auto; box-sizing: border-box; }
        h1 { text-align: center; color: #4caf50; margin-bottom: 5px; font-size: 24px; }
        h3 { text-align: center; color: #bbb; margin-top: 0; font-weight: normal; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; gap: 10px; }
        .form-control { flex: 1; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; color: #aaa; font-size: 14px; }
        select, input { padding: 10px; border-radius: 6px; border: 1px solid #444; background-color: #2a2a2a; color: #fff; font-size: 15px; box-sizing: border-box; }
        
        /* Select All Section */
        .select-all-container { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; background: #252525; border-radius: 6px; margin-top: 15px; border: 1px solid #3a3a3a; }
        .select-all-label { font-weight: bold; color: #4caf50; font-size: 15px; }

        .student-list { margin-top: 10px; max-height: 400px; overflow-y: auto; border: 1px solid #333; padding: 10px; border-radius: 6px; background: #151515; }
        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2a2a2a; }
        .student-item:last-child { border-bottom: none; }
        .student-info { display: flex; gap: 15px; font-size: 15px; align-items: center; width: 80%; }
        .roll-no { color: #4caf50; font-weight: bold; width: 30px; }
        .name { color: #fff; }
        
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #4caf50; }
        
        button { width: 100%; padding: 12px; border-radius: 6px; border: none; background-color: #4caf50; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #45a049; }
        #loading { text-align: center; color: #ff9800; font-weight: bold; margin: 10px 0; }
        #msg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>TTWRJC YAKUBPURA</h1>
    <h3>అటెండెన్స్ మేనేజ్‌మెంట్ సిస్టమ్</h3>
    
    <div class="form-group">
        <div class="form-control">
            <label>తరగతి (Class):</label>
            <select id="className" onchange="loadStudents()">
                <option value="BiPC II">BiPC II</option>
                <option value="BiPC I">BiPC I</option>
            </select>
        </div>
        <div class="form-control">
            <label>తేదీ (Date):</label>
            <input type="date" id="attendanceDate" onchange="loadStudents()">
        </div>
    </div>

    <div class="select-all-container">
        <span class="select-all-label">అందరినీ సెలెక్ట్ చేయి (Select All)</span>
        <input type="checkbox" id="selectAllBox" onchange="toggleSelectAll(this)">
    </div>

    <div id="loading" style="display:none;">గూగుల్ షీట్ నుండి విద్యార్థుల లిస్ట్ లోడ్ అవుతోంది...</div>
    
    <div class="student-list" id="studentContainer"></div>

    <button onclick="submitAllAttendance()">సబ్మిట్ చేయి (Submit Attendance)</button>
    <p id="msg"></p>
</div>

<script src="app.js"></script>
</body>
</html>
